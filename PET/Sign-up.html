<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up | Peso Tracker</title>
    <link rel="stylesheet" href="css/Sign-up.css" />
    <link rel="icon" type="image/png" href="images/Logo.png" />
  </head>
  <body>
    <main class="signUp-container">
      <section>
        <h1>Sign Up</h1>
        <p>Create your account to start tracking your finances.</p>

        <form
          action="Sign-up.php"
          method="POST"
          class="SignUpForm"
          id="SignUpForm"
        >
          <input
            type="text"
            name="display_name"
            placeholder="Enter your Display Name..."
            id="display_name"
            required
          />

          <input
            type="email"
            name="email"
            placeholder="Enter your Email..."
            id="email"
            required
          />

          <input
            type="password"
            name="password"
            placeholder="Enter your password..."
            id="password"
            required
          />

          <input
            type="number"
            name="current_balance"
            id="current_balance"
            placeholder="Enter your remaining money..."
            required
          />

          <button type="submit" class="btn-SignUp">Sign Up</button>
        </form>

        <div class="links">
          <p>Already have an account?</p>
          <a onclick="toLogin()">Log In</a>
        </div>
      </section>
    </main>

    <div class="page-transition"></div>
    <div class="page-transition-solid"></div>

    <script src="js/Sign-up.js"></script>
  </body>
</html>
