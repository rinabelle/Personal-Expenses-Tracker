<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | Peso Tracker</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/Sign-up.css" />
</head>
<body>
  
  <main class="signUp-container">

    <!-- Logo outside the glass box -->
    <div class="logo">
      <div class="MyLogo">
        <img src="images/logo1.png" alt="Peso Tracker Logo">
      </div>
      <span class="name">Peso Tracker</span>
    </div>

    <!-- Glass box -->
    <div class="SignUpCover">
      
      <!-- Text Section -->
      <div class="text">
        <h1>Sign Up</h1>
        <p>Create your account to start tracking your finances.</p>
      </div>

      <!-- Form Section -->
      <form class="SignUpForm" id="SignUpForm">
        <input type="text" id="display_name" placeholder="Username" required />
        <input type="email" id="email" placeholder="Email" required />
        <input type="password" id="password" placeholder="Password" required />
        <input type="number" id="starting_balance" placeholder="Starting Balance" required />
        <button type="submit" class="btn-SignUp">Sign Up</button>
      </form>

      <!-- Links Section -->
      <div class="links">
        <p>Already have an account?</p>
        <a href="Log-in.html">Log In</a>
      </div>

    </div>

  </main>

  <script src="js/Sign-up.js"></script>
</body>
</html>
