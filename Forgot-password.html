<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password | Peso Tracker</title>
    <link rel="stylesheet" href="css/Forgot-password.css" />
    <link rel="icon" type="image/png" href="images/Logo.png" />
  </head>
  <body>
    <main class="ForgotContainer">
      
    <div class="logo">
      <div class="MyLogo">
        <img src="images/logo1.png" alt="Peso Tracker Logo">
      </div>
      <span class="name">Peso Tracker</span>
    </div>

      <section class="ForgotBox">
        <div class="text">
          <h1>Reset Your Password</h1>
          <p>Enter your email and we'll send you a reset link.</p>
        </div>

        <form class="ForgotForm" id="ForgotForm">
          <input type="email" name="email" placeholder="Email" id="email" required />
          <button type="submit" class="btn-submit">Submit</button>
        </form>

        <div class="links">
          <a onclick="toLogin()">Back To Login</a>
        </div>
      </section>
    </main>

    <div class="page-transition"></div>
    <div class="page-transition-solid"></div>

    <script src="js/Forgot-password.js"></script>
  </body>
</html>
